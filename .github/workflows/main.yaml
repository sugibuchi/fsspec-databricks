name: Test and publish Python package


on:
  workflow_dispatch:
    inputs:
      run-cross-version-tests:
        description: "Whether to run cross-version tests"
        type: boolean
        required: false
        default: false
      test-publish:
        description: "Whether to run publish tests"
        type: boolean
        required: false
        default: false

  push: { }

  release:
    types:
      - published

concurrency:
  group: "main-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  test:
    name: Test with the latest Python version
    uses: ./.github/workflows/test.yaml
    with:
      python-version: "3.14"
      coverage: ${{ github.ref_name == 'main' }}
    secrets: inherit

  cross_version_test:
    name: Test with the older Python versions
    if: ${{ github.ref_name == 'main' || inputs.run-cross-version-tests || github.event_name == 'release' }}
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    uses: ./.github/workflows/test.yaml
    with:
      python-version: ${{ matrix.python-version }}
      coverage: false
    secrets: inherit

  publish:
    name: Publish package distributions to PyPI
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    environment:
      name: "pypi"
      url: "https://pypi.org/project/fsspec-databricks"
    needs:
      - test
      - cross_version_test
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync

      - name: Build package distributions
        run: uv build

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ vars.REPOSITORY_URL }}

  test-publish:
    name: Publish package distributions to PyPI
    if: ${{ inputs.test-publish }}
    runs-on: ubuntu-latest
    environment:
      name: "test-pypi"
      url: "https://test.pypi.org/project/fsspec-databricks"
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync

      - name: Build package distributions
        run: uv build

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ vars.REPOSITORY_URL }}
