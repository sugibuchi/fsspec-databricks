name: Check the source code

on:
  workflow_call:
    inputs:
      lint:
        description: "Whether to run the linter."
        type: boolean
        required: false
        default: true

concurrency:
  group: "check-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    if: ${{ inputs.lint }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run ruff check
        run: uvx ruff check .

      - name: Run ruff format check
        run: uvx ruff format --check .
